<!DOCTYPE html>
<html lang="en-US">
    <head>
        <meta charset="utf-8">
        <title>
            Austin McCarter | ITIS 3135 | Calculator
        </title>
        <link rel="shortcut icon" href="images/monkeylogo-removebg.png">
    </head>
    <body>
        <header>
            <div data-include="components/header.html"></div>
        </header>
        <main>
            <h2> Calculator Try! </h2>
            <div class="calculator">
                <input type="text" value="" disabled class="displaycalc" />
                    <div class="cal_btn">
                        <button class="all-clear" type="button" value="all-clear">AC</button>
                        <button type="button" class="decimal" value=".">.</button>
                        <button class="equal operator" type="button" value="=">=</button>

                        <button class="operator" type="button" value="+">+</button>
                        <button class="operator" type="button" value="-">-</button>
                        <button class="operator" type="button" value="*">&times;</button>
                        <button class="operator" type="button" value="/">&divide;</button>

                        <button id="seven" onclick="getNumber()">7</button>
                        <button id="eight" onclick="getNumber()">8</button>
                        <button id="nine" onclick="getNumber()">9</button>

                        <button id="four"conclick="getNumber()">4</button>
                        <button id="five" onclick="getNumber()">5</button>
                        <button id="six" onclick="getNumber()">6</button>

                        <button id="one" onclick="getNumber()">1</button>
                        <button id="two" onclick="getNumber()">2</button>
                        <button id="three" onclick="getNumber()">3</button>

                        <button type="button" value="0">0</button>
                    </div>
            </div>
        </main>
        <footer>
            <div data-include="components/footer.html"></div>
        </footer>
        <script src="scripts/htmlinclude.js"></script>
        <script src="scripts/calculator_try.js"></script>
    </body>
</html>
