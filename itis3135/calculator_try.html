<!DOCTYPE html>
<html lang="en-US">
    <head>
        <meta charset="utf-8">
        <title>
            Austin McCarter | ITIS 3135 | Aquamarine Monkey | Calculator Try!
        </title>
        <link rel="shortcut icon" href="images/monkeylogo-removebg.png">
        <link rel="stylesheet" href="styles/default.css">
    </head>
    <body>
        <header>
            <div data-include="components/header.html"></div>
        </header>
        <main>
            <h2> Calculator Try! </h2>
            <div class="calculator">
                <span id="display">0</span>
                    <div class="cal_btn">
                        <button id="all-clear" onclick="allclear()">AC</button>
                        <button id="decimal">.</button>
                        <button id="equal" onclick="calculate()">=</button>

                        <button id="plus" onclick="getOperator(this.value)" value="+">+</button>
                        <button id="minus" onclick="getOperator(this.value)" value="-">-</button>
                        <button id="times" onclick="getOperator(this.value)" value="*">&times;</button>
                        <button id="divide" onclick="getOperator(this.value)" value="/">&divide;</button>

                        <button id="button7" onclick="getNumber(this.value)" value="7">7</button>
                        <button id="button8" onclick="getNumber(this.value)" value="8">8</button>
                        <button id="button9" onclick="getNumber(this.value)" value="9">9</button>

                        <button id="button4" onclick="getNumber(this.value)" value="4">4</button>
                        <button id="button5" onclick="getNumber(this.value)" value="5">5</button>
                        <button id="button6" onclick="getNumber(this.value)" value="6">6</button>

                        <button id="button1" onclick="getNumber(this.value)" value="1">1</button>
                        <button id="button2" onclick="getNumber(this.value)" value="2">2</button>
                        <button id="button3" onclick="getNumber(this.value)" value="3">3</button>

                        <button id="button0" onclick="getNumber(this.value)" value="0">0</button>
                    </div>
            </div>
        </main>
        <footer>
            <div data-include="components/footer.html"></div>
        </footer>
        <script src="scripts/htmlinclude.js"></script>
        <script src="scripts/calculator_try.js"></script>
    </body>
</html>
