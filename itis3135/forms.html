<!DOCTYPE html>
<html lang="en-US">

  <head>
    <meta charset="utf-8" />
    <title>
      Austin McCarter | ITIS 3135 | Aquamarine Monkey | Forms
    </title>
    <link rel="stylesheet" href="styles/default.css">
    <link rel="shortcut icon" href="images/monkeylogo-removebg.png">
    <link href="//maxcdn.bootstrapcdn.com/font-awesome/4.1.0/css/font-awesome.min.css" rel="stylesheet">
  </head>

  <body>
    <header>
      <div data-include="components/header.html"></div>
    </header>
    <main>
      <h2>Haircare Products Catalog</h2>
      <figure>
        <figcaption>Signup for the best Catalog!</figcaption>
        <form action="#">
          <div class="input-container">
            <i class="fa fa-user icon"></i>
            <input class="input-field" type="text" id="fname" name="fname" placeholder="First Name" required><br>
            <input class="input-field" type="text" id="lname" name="lname" placeholder="Last Name" required><br>
          </div>
          <div class="input-container">
            <i class="fa fa-phone icon"></i>
            <input class="input-field" type="tel" id="phone" name="phone" pattern="[0-9]{3}-[0-9]{2}-[0-9]{3}" placeholder="phone number" required><br>
          </div>
          <div class="input-container">
            <i class="fa fa-envelope icon"></i>
            <input class="input-field" type="email" id="email" name="email" placeholder="email"><br>
          </div>
          <figure class="container">
            <figcaption>Hair products you commonly used in the shower:</figcaption>
            <input type="checkbox" id="product1" name="product1" value="shampoo">
            <label for="product1">Shampoo</label>
            <input type="checkbox" id="product2" name="product2" value="conditioner">
            <label for="product2">Conditioner</label>
            <input type="checkbox" id="product3" name="product3" value="hairmask">
            <label for="product3">Hair Mask</label>
          </figure>
          <figure class="container">
            <figcaption>Hair sprays you most commonly use:</figcaption>
            <input type="radio" id="product4" name="product4" value="dryshampoo">
            <label for="product4">Dry Shampoo</label>
            <input type="radio" id="product5" name="product5" value="gel">
            <label for="product5">Gel</label>
            <input type="radio" id="product6" name="product6" value="Volumizer">
            <label for="product6">Volumizer</label>
          </figure>
          <label for="contact">Perfered form of contact</label>
          <select name="contact" id="contact">
            <option value="phone">SMS</option>
            <option value="email">Email</option>
          </select>
          <br><input type="submit" class="btn"><br>
          <input type="reset" class="btn">
        </form>
      </figure>
    </main>
    <footer>
      <footer>
        <div data-include="components/footer.html"></div>
    </footer>
    <script src="scripts/htmlinclude.js"></script>
    </footer>
  </body>

</html>
